# ============================================
#   GPT-Image-2 Hub
# ============================================

# 사이트 기본 정보
title: "GPT-Image-2 Hub"
description: "전문가 수준의 이미지 생성을 위한 큐레이션된 프롬프트 컬렉션 163선"
baseurl: "/gpt-image-2-prompts"
url: "https://tradecyh-oss.github.io"

# 테마 설정
remote_theme: just-the-docs/just-the-docs
color_scheme: light

# 검색 기능
search_enabled: true
search:
  heading_level: 2
  previews: 4
  preview_words_before: 8
  preview_words_after: 8
  rel_url: true
  button: false

# 외부 네비게이션 링크
nav_external_links:
  - title: "원본 저장소"
    url: "https://github.com/EvoLinkAI/awesome-gpt-image-2-prompts"

# 페이지 편집 링크
gh_edit_link: true
gh_edit_link_text: "GitHub에서 편집"
gh_edit_repository: "https://github.com/tradecyh-oss/gpt-image-2-prompts"
gh_edit_branch: "main"
gh_edit_view_mode: "tree"

# 푸터
footer_content: '© 2026 GPT-Image-2 Hub. 원본 프롬프트의 저작권은 각 원작자에게 있습니다. <a href="https://github.com/EvoLinkAI/awesome-gpt-image-2-prompts">원본 저장소</a>'

# 플러그인
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# 처리 제외 파일
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
