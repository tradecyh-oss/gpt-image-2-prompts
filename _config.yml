# 사이트 기본 정보
title: GPT-Image-2 프롬프트 모음
description: GPT-Image-2를 위한 큐레이션된 프롬프트 사례 163선
# 깃허브 페이지에서 저장소 이름이 URL 경로가 되므로 baseurl 지정
baseurl: "/gpt-image-2-prompts"
url: "https://tradecyh-oss.github.io"

# 테마: Just the Docs (깃허브 페이지 공식 지원)
remote_theme: just-the-docs/just-the-docs

# 색상 / 레이아웃 옵션
color_scheme: light
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# 각 페이지에 "이 페이지 깃허브에서 편집" 링크 자동 표시
gh_edit_link: true
gh_edit_link_text: "GitHub에서 이 페이지 편집하기"
gh_edit_repository: "https://github.com/tradecyh-oss/gpt-image-2-prompts"
gh_edit_branch: "main"
gh_edit_view_mode: "tree"

# 푸터
footer_content: '카피라이트 &copy; 2026. 원본 프롬프트의 저작권은 각 원작자에게 있습니다. <a href="https://github.com/EvoLinkAI/awesome-gpt-image-2-prompts">원본 저장소</a>'

# 플러그인
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# 처리 제외 파일
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
